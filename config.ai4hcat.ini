[dir]
root = .
data = ${root}/data
cache = ${data}/cache
merged = ${data}/${platform:struct}/merged
queries = ${data}/${platform:struct}/queries
evaluation = ${data}/${platform:struct}/evaluation
evaluation_dom_cat = ${evaluation}/domain_categories
evaluation_mod_cat = ${evaluation}/model_categories
paperoni = ${root}/paperoni
log = ${root}/logs

[env]
OPENAI_API_KEY =
OPENAI_ORG_ID =
OPENAI_PROJECT_ID =
PAPERONI_CONFIG = ${dir:paperoni}/config.yaml

[platform]
select = openai
struct = ai4hcat

# model: provisional GPT-5.6 default; production tier pinned by B2 (#29).
[openai]
model = gpt-5.6-sol

[vertexai]
project =
model = models/gemini-1.5-pro

[paperoni]
url = https://paperoni.mila.quebec

[evaluation]
collapse_cat = true
dom_cat = milabenchv1
mod_cat = milabenchv1

[logging]
level = NOTSET
